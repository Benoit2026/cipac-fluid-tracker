YPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIPAC — Suivi Fluid Analysis</title>
<style>
:root{--navy:#002864;--navy-med:#003C78;--navy-light:#E8EDF5;--green:#8CB414;--red:#A32D2D;--red-light:#FCEBEB;--amber:#854F0B;--amber-light:#FAEEDA;--ok:#3B6D11;--ok-light:#EAF3DE;--border:#C8D0DC;--bg:#F8F7F3;--white:#FFFFFF;--text:#2C2C2A;--text-sec:#888780;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.header{background:var(--navy);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;}
.header-logo{display:flex;align-items:center;gap:12px;}
.header-sub{color:rgba(255,255,255,0.7);font-size:12px;}
.header-bar{height:3px;background:linear-gradient(90deg,var(--navy) 85%,var(--green) 85%);}
.live-badge{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.1);padding:5px 12px;border-radius:20px;cursor:pointer;}
.live-badge:hover{background:rgba(255,255,255,0.2);}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
.live-dot.admin{background:#FFD700;animation:none;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.live-text{color:rgba(255,255,255,0.8);font-size:11px;font-weight:500;}
.admin-badge{display:none;align-items:center;gap:5px;background:rgba(255,215,0,0.2);border:1px solid rgba(255,215,0,0.4);padding:4px 10px;border-radius:20px;margin-left:8px;}
.admin-badge.visible{display:flex;}
.admin-badge span{color:#FFD700;font-size:11px;font-weight:500;}
.logout-btn{background:none;border:none;color:rgba(255,215,0,0.7);font-size:12px;cursor:pointer;padding:0 0 0 6px;}
.back-btn{display:none;align-items:center;gap:6px;background:rgba(255,255,255,0.1);border:none;color:#fff;padding:5px 14px;border-radius:20px;cursor:pointer;font-size:12px;}
.back-btn.visible{display:flex;}
.home-page{max-width:700px;margin:0 auto;padding:40px 16px;}
.home-title{font-size:22px;font-weight:500;color:var(--navy);margin-bottom:6px;}
.home-sub{font-size:14px;color:var(--text-sec);margin-bottom:32px;}
.client-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;}
.client-card{background:var(--white);border-radius:14px;border:0.5px solid var(--border);padding:20px 24px;cursor:pointer;transition:all .2s;position:relative;}
.client-card:hover{border-color:var(--navy);box-shadow:0 4px 16px rgba(0,40,100,0.1);transform:translateY(-2px);}
.client-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;border-radius:14px 14px 0 0;}
.client-card.prony::before{background:linear-gradient(90deg,var(--navy),var(--green));}
.client-card.nmc::before{background:linear-gradient(90deg,var(--amber),var(--red));}
.client-logo-home{height:48px;max-width:130px;object-fit:contain;margin-bottom:12px;display:block;}
.client-name{font-size:15px;font-weight:500;color:var(--text);margin-bottom:4px;}
.client-machines{font-size:12px;color:var(--text-sec);margin-bottom:14px;}
.client-stats{display:flex;gap:10px;}
.cstat{background:var(--bg);border-radius:6px;padding:6px 10px;text-align:center;}
.cstat-val{font-size:16px;font-weight:500;}
.cv-todo{color:var(--red)}.cv-done{color:var(--ok)}.cv-total{color:var(--navy)}
.arrow{position:absolute;right:20px;top:50%;transform:translateY(-50%);font-size:20px;color:var(--border);}
.client-card:hover .arrow{color:var(--navy);}
.client-page{display:none;max-width:900px;margin:0 auto;padding:20px 16px;}
.client-page.active{display:block;}
.client-hdr{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.client-logo-hdr{height:38px;max-width:110px;object-fit:contain;}
.client-page-title{font-size:17px;font-weight:500;color:var(--navy);}
.client-page-sub{font-size:12px;color:var(--text-sec);}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;}
.stat{background:var(--white);border-radius:10px;border:0.5px solid var(--border);padding:12px 14px;}
.stat-label{font-size:11px;color:var(--text-sec);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
.stat-val{font-size:22px;font-weight:500;}
.s-total{color:var(--navy)}.s-todo{color:var(--red)}.s-done{color:var(--ok)}
.toolbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
.fbtn{padding:6px 14px;border:0.5px solid var(--border);border-radius:20px;font-size:12px;cursor:pointer;background:var(--white);color:var(--text-sec);transition:all .15s;}
.fbtn.on{background:var(--navy);color:#fff;border-color:var(--navy);}
.search{flex:1;min-width:130px;max-width:200px;padding:6px 12px;border:0.5px solid var(--border);border-radius:20px;font-size:12px;background:var(--white);color:var(--text);outline:none;}
.add-btn{margin-left:auto;display:flex;align-items:center;gap:6px;padding:7px 16px;background:var(--navy);color:#fff;border:none;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;}
.archive-btn{display:none;align-items:center;gap:6px;padding:7px 14px;background:var(--amber-light);color:var(--amber);border:0.5px solid var(--amber);border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;}
.archive-btn.visible{display:flex;}
.machine-block{background:var(--white);border-radius:12px;border:0.5px solid var(--border);margin-bottom:12px;overflow:hidden;}
.machine-header{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;user-select:none;transition:background .15s;}
.machine-header:hover{background:var(--navy-light);}
.machine-sn{font-size:14px;font-weight:500;color:var(--navy);}
.prog-wrap{display:flex;align-items:center;gap:8px;margin-left:auto;}
.prog-bar{height:5px;background:var(--border);border-radius:3px;width:70px;overflow:hidden;}
.prog-fill{height:100%;border-radius:3px;background:var(--ok);transition:width .4s;}
.prog-text{font-size:11px;color:var(--text-sec);min-width:52px;text-align:right;}
.chevron{font-size:13px;color:var(--text-sec);transition:transform .2s;margin-left:4px;}
.collapsed .chevron{transform:rotate(-90deg);}
.collapsed .actions-list{display:none;}
.badge{display:inline-flex;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500;}
.badge.ab{background:var(--red-light);color:var(--red)}.badge.mo{background:var(--amber-light);color:var(--amber)}.badge.ok{background:var(--ok-light);color:var(--ok)}
.actions-list{border-top:0.5px solid var(--border);}
.action-row{display:flex;align-items:flex-start;gap:10px;padding:10px 16px;border-bottom:0.5px solid var(--border);transition:background .15s;}
.action-row:last-child{border-bottom:none;}
.action-row:hover{background:#FAFAF8;}
.action-row.done{opacity:.55;}
.chk{width:24px;height:24px;border:2px solid var(--border);border-radius:6px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;margin-top:1px;background:var(--white);}
.chk:hover:not(.locked){border-color:var(--ok);background:var(--ok-light);transform:scale(1.05);}
.chk.checked{background:var(--ok);border-color:var(--ok);}
.chk.checked::after{content:'';display:block;width:6px;height:11px;border:2.5px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px);}
.chk.locked{cursor:not-allowed;opacity:.7;}
.chk.locked:hover{border-color:var(--border);background:var(--white);transform:none;}
.chk.checked.admin-unlock{border-color:#FFD700;box-shadow:0 0 0 2px rgba(255,215,0,0.3);}
.action-body{flex:1;min-width:0;}
.action-text{font-size:13px;color:var(--text);line-height:1.45;}
.action-row.done .action-text{text-decoration:line-through;color:var(--text-sec);}
.action-meta{display:flex;gap:6px;margin-top:5px;flex-wrap:wrap;align-items:center;}
.chip{display:inline-flex;font-size:11px;color:var(--text-sec);background:var(--bg);padding:2px 8px;border-radius:4px;border:0.5px solid var(--border);}
.prio{display:inline-flex;font-size:11px;font-weight:500;padding:2px 8px;border-radius:4px;}
.prio.high{background:var(--red-light);color:var(--red)}.prio.med{background:var(--amber-light);color:var(--amber)}.prio.low{background:var(--ok-light);color:var(--ok)}
.done-info{font-size:11px;color:var(--ok);margin-top:4px;}
.comment-display{font-size:11px;color:var(--navy);background:var(--navy-light);border-radius:5px;padding:4px 8px;margin-top:5px;}
.action-btns{display:flex;flex-direction:column;gap:4px;flex-shrink:0;margin-top:1px;}
.icon-btn{width:28px;height:28px;border:0.5px solid var(--border);border-radius:6px;cursor:pointer;background:var(--white);color:var(--text-sec);display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .15s;}
.icon-btn:hover{background:var(--navy-light);border-color:var(--navy);color:var(--navy);}
.icon-btn.on{background:var(--navy-light);border-color:var(--navy);color:var(--navy);}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;}
.modal{background:var(--white);border-radius:16px;padding:24px;width:100%;max-width:340px;text-align:center;}
.modal.wide{text-align:left;max-width:420px;max-height:90vh;overflow-y:auto;}
.modal h3{font-size:15px;font-weight:500;color:var(--navy);margin-bottom:8px;}
.modal p{font-size:13px;color:var(--text-sec);margin-bottom:16px;}
.modal label{font-size:12px;color:var(--text-sec);display:block;margin-bottom:3px;margin-top:10px;}
.modal input,.modal select,.modal textarea{width:100%;padding:7px 10px;border:0.5px solid var(--border);border-radius:8px;font-size:13px;color:var(--text);outline:none;}
.modal textarea{height:80px;resize:vertical;}
.comment-ctx{font-size:12px;color:var(--text-sec);background:var(--bg);border-radius:6px;padding:8px 10px;margin-bottom:12px;}
.modal-btns{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;}
.btn-cancel{padding:8px 16px;font-size:13px;border:0.5px solid var(--border);border-radius:8px;cursor:pointer;background:var(--white);color:var(--text-sec);}
.btn-save{padding:8px 18px;font-size:13px;font-weight:500;border:none;border-radius:8px;cursor:pointer;background:var(--navy);color:#fff;}
.btn-del{padding:8px 14px;font-size:13px;border:0.5px solid var(--red);border-radius:8px;cursor:pointer;background:var(--red-light);color:var(--red);margin-right:auto;}
.pin-dots{display:flex;justify-content:center;gap:12px;margin-bottom:20px;}
.pin-dot{width:14px;height:14px;border-radius:50%;background:var(--border);transition:background .15s;}
.pin-dot.filled{background:var(--navy);}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:240px;margin:0 auto 12px;}
.pin-key{padding:14px;font-size:18px;font-weight:500;border:0.5px solid var(--border);border-radius:10px;cursor:pointer;background:var(--white);color:var(--text);transition:all .15s;}
.pin-key:hover{background:var(--navy-light);border-color:var(--navy);}
.pin-key.del{font-size:14px;color:var(--red);}
.pin-err{font-size:12px;color:var(--red);margin-top:8px;min-height:18px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:opacity .3s;pointer-events:none;z-index:200;white-space:nowrap;}
.toast.show{opacity:1;}
.loading{text-align:center;padding:3rem;color:var(--text-sec);}
.spinner{display:inline-block;width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite;margin-right:8px;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:600px){.stats{grid-template-columns:repeat(2,1fr)}.prog-wrap{display:none}.client-cards{grid-template-columns:1fr}}
</style>
</head>

<div class="header">
  <div class="header-logo">
    <img id="logo-cipac" style="height:36px;object-fit:contain;" alt="CIPAC Services">
    <span class="header-sub" id="header-sub">Fluid Analysis &mdash; Suivi des actions</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <button class="back-btn" id="back-btn" onclick="goHome()">&#8592; Accueil</button>
    <div class="admin-badge" id="admin-badge">
      <span>&#9733; Admin</span>
      <button class="logout-btn" onclick="logout()">&#10005;</button>
    </div>

      <div class="live-dot" id="live-dot"></div>
      <span class="live-text" id="live-text">Temps r&eacute;el</span>
    </div>
  </div>
</div>
<div class="header-bar"></div>

<div id="home-page">
  <div class="home-page">
    <div class="home-title">Choisissez un client</div>
    <div class="home-sub">S&eacute;lectionnez le client pour consulter et g&eacute;rer les actions Fluid Analysis</div>
    <div class="client-cards">
      <div class="client-card prony" id="card-prony" onclick="openClient('prony')">
        <img id="logo-prony" class="client-logo-home" alt="Prony Resources">
        <div class="client-name">Prony Ressources Nouvelle-Cal&eacute;donie</div>
        <div class="client-machines">11 machines A60H</div>
        <div class="client-stats">
          <div class="cstat"><div class="cstat-val cv-total" id="p-total">-</div><div class="cstat-label">Total</div></div>
          <div class="cstat"><div class="cstat-val cv-todo" id="p-todo">-</div><div class="cstat-label">&Agrave; faire</div></div>
          <div class="cstat"><div class="cstat-val cv-done" id="p-done">-</div><div class="cstat-label">Valid&eacute;es</div></div>
        </div>
        <span class="arrow">&#8250;</span>
      </div>
      <div class="client-card nmc" id="card-nmc" onclick="openClient('nmc')">
        <img id="logo-nmc" class="client-logo-home" alt="Nickel Mining Company">
        <div class="client-name">Nickel Mining Company</div>
        <div class="client-machines">15 machines</div>
        <div class="client-stats">
          <div class="cstat"><div class="cstat-val cv-total" id="n-total">-</div><div class="cstat-label">Total</div></div>
          <div class="cstat"><div class="cstat-val cv-todo" id="n-todo">-</div><div class="cstat-label">&Agrave; faire</div></div>
          <div class="cstat"><div class="cstat-val cv-done" id="n-done">-</div><div class="cstat-label">Valid&eacute;es</div></div>
        </div>
        <span class="arrow">&#8250;</span>
      </div>
    </div>
  </div>
</div>

<div class="client-page" id="client-page">
  <div class="client-hdr">
    <img id="client-logo-hdr" class="client-logo-hdr" src="" alt="">
    <div>
      <div class="client-page-title" id="client-page-title"></div>
      <div class="client-page-sub" id="client-page-sub"></div>
    </div>
  </div>
  <div class="stats" id="stats"></div>
  <div class="toolbar">
    <button class="fbtn on" onclick="setFilter(this,'all')">Toutes</button>
    <button class="fbtn" onclick="setFilter(this,'todo')">&Agrave; faire</button>
    <button class="fbtn" onclick="setFilter(this,'done')">Valid&eacute;es</button>
    <button class="fbtn" onclick="setFilter(this,'archived')">Archives</button>
    <button class="fbtn" onclick="setFilter(this,'high')">Priorit&eacute; haute</button>
    <input class="search" type="text" placeholder="Rechercher&hellip;" oninput="render()" id="search">
    <button class="archive-btn" id="archive-btn" onclick="archiveDone()">&#128193; Archiver les valid&eacute;es</button>
    <button class="add-btn" onclick="openAdd('')">+ Nouvelle action</button>
  </div>
  <div id="list"><div class="loading"><span class="spinner"></span>Chargement&hellip;</div></div>
</div>

<div id="pin-modal" style="display:none" class="overlay" onclick="if(event.target===this)closePinModal()">
<div class="modal">
  <h3>&#128274; Mode administrateur</h3>
  <p>Entrez votre PIN pour activer le mode admin</p>
  <div class="pin-dots"><div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div><div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div></div>
  <div class="pin-pad">
    <button class="pin-key" onclick="pinKey('1')">1</button><button class="pin-key" onclick="pinKey('2')">2</button><button class="pin-key" onclick="pinKey('3')">3</button>
    <button class="pin-key" onclick="pinKey('4')">4</button><button class="pin-key" onclick="pinKey('5')">5</button><button class="pin-key" onclick="pinKey('6')">6</button>
    <button class="pin-key" onclick="pinKey('7')">7</button><button class="pin-key" onclick="pinKey('8')">8</button><button class="pin-key" onclick="pinKey('9')">9</button>
    <button class="pin-key del" onclick="pinDel()">&#9003;</button><button class="pin-key" onclick="pinKey('0')">0</button>
    <button class="pin-key" onclick="closePinModal()" style="font-size:11px;color:#888">Annuler</button>
  </div>
  <div class="pin-err" id="pin-err"></div>
</div>
</div>

<div id="comment-modal" style="display:none" class="overlay" onclick="if(event.target===this)closeCommentModal()">
<div class="modal wide">
  <h3>&#128172; Commentaire</h3>
  <div class="comment-ctx" id="comment-ctx"></div>
  <label>Votre commentaire</label>
  <textarea id="comment-text" placeholder="Ex: Filtre chang&eacute; le 15/06, en attente pi&egrave;ce..."></textarea>
  <div class="modal-btns">
    <button class="btn-del" id="btn-del-comment" style="display:none" onclick="deleteComment()">Supprimer</button>
    <button class="btn-cancel" onclick="closeCommentModal()">Annuler</button>
    <button class="btn-save" onclick="saveComment()">Enregistrer</button>
  </div>
</div>
</div>

<div id="action-modal" style="display:none" class="overlay" onclick="if(event.target===this)closeModal()">
<div class="modal wide">
  <h3 id="modal-title">Ajouter une action</h3>
  <label>Machine S/N</label><input type="text" id="m-sn" placeholder="ex: A60H 320768">
  <label>Point de pr&eacute;l&egrave;vement</label><input type="text" id="m-point" placeholder="ex: Hydraulique">
  <label>N&deg; FA</label><input type="text" id="m-fa" placeholder="ex: FA0279378">
  <label>Action &agrave; mener</label><textarea id="m-action" placeholder="D&eacute;crire l'action&hellip;"></textarea>
  <label>Priorit&eacute;</label>
  <select id="m-prio"><option value="high">Haute &mdash; intervention urgente</option><option value="med" selected>Moyenne &mdash; prochain intervalle</option><option value="low">Basse &mdash; surveillance</option></select>
  <label>S&eacute;v&eacute;rit&eacute;</label>
  <select id="m-sev"><option value="ab">ANORMAL</option><option value="mo" selected>MONITOR</option><option value="ok">NORMAL</option></select>
  <div class="modal-btns">
    <button class="btn-cancel" onclick="closeModal()">Annuler</button>
    <button class="btn-save" onclick="saveAction()">Enregistrer</button>
  </div>
</div>
</div>

var allActions=[], filter='all', editId=null, commentId=null, isAdmin=false, pinInput='', curClient=null;

function sevLabel(s){ return {'ab':'ANORMAL','mo':'MONITOR','ok':'NORMAL'}[s]||s; }
function prioLabel(p){ return {'high':'Priorite haute','med':'Priorite moyenne','low':'Basse'}[p]||p; }

async function api(method,path,body){
  var opts={method:method,headers:HDR};
  if(body) opts.body=JSON.stringify(body);
  var r=await fetch(SB_URL+'/rest/v1/'+path,opts);
  if(!r.ok){var e=await r.text();throw new Error(e);}
  var t=await r.text(); return t?JSON.parse(t):null;
}

async function loadAll(){
  try{
    var d=await api('GET','fa_actions?select=*&order=id');
    allActions=d||[]; updateHomeStats(); if(curClient) render();
  }catch(e){console.error(e);}
}

function extractSN(sn){
  if(!sn) return '';
  var p=sn.trim().split(' ');
  return p[p.length-1];
}

function actionsFor(k){
  var sns=CLIENTS[k].sns;
  return allActions.filter(function(a){ return sns.indexOf(extractSN(a.sn))>=0; });
}

function updateHomeStats(){
  ['prony','nmc'].forEach(function(k){
    var acts=actionsFor(k).filter(function(a){return !a.archived;});
    var pre=k==='prony'?'p':'n';
    var t=document.getElementById(pre+'-total');
    var d=document.getElementById(pre+'-todo');
    var v=document.getElementById(pre+'-done');
    if(t) t.textContent=acts.length;
    if(d) d.textContent=acts.filter(function(a){return a.status==='todo';}).length;
    if(v) v.textContent=acts.filter(function(a){return a.status==='done';}).length;
  });
}

function goHome(){
  curClient=null;
  document.getElementById('home-page').style.display='block';
  document.getElementById('client-page').classList.remove('active');
  document.getElementById('back-btn').classList.remove('visible');
  document.getElementById('header-sub').textContent='Fluid Analysis - Suivi des actions';
  filter='all';
}

function openClient(k){
  curClient=k; var c=CLIENTS[k];
  document.getElementById('home-page').style.display='none';
  document.getElementById('client-page').classList.add('active');
  document.getElementById('back-btn').classList.add('visible');

  document.getElementById('client-page-sub').textContent=c.sns.length+' machines - Fluid Analysis';

  document.querySelectorAll('.fbtn').forEach(function(b,i){b.classList.toggle('on',i===0);});
  render();
}

function clientActions(){ return curClient?actionsFor(curClient):[]; }

function filtered(){
  var q=(document.getElementById('search').value||'').toLowerCase();
  return clientActions().filter(function(a){
    if(filter==='archived') return a.archived===true;
    if(a.archived) return false;
    if(filter==='todo'&&a.status!=='todo') return false;
    if(filter==='done'&&a.status!=='done') return false;
    if(filter==='high'&&a.prio!=='high') return false;
    if(q&&(a.sn+' '+a.point+' '+a.text+' '+a.fa).toLowerCase().indexOf(q)<0) return false;
    return true;
  });
}

function setFilter(btn,f){
  document.querySelectorAll('.fbtn').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on'); filter=f; render();
}

function grouped(list){
  var m={};
  list.forEach(function(a){if(!m[a.sn])m[a.sn]=[];m[a.sn].push(a);});
  return m;
}

function renderStats(){
  var acts=clientActions().filter(function(a){return !a.archived;});
  var todo=acts.filter(function(a){return a.status==='todo';}).length;
  var done=acts.filter(function(a){return a.status==='done';}).length;
  var pct=acts.length?Math.round(done/acts.length*100):0;
  document.getElementById('stats').innerHTML=
    '<div class="stat"><div class="stat-label">Total</div><div class="stat-val s-total">'+acts.length+'</div></div>'+
    '<div class="stat"><div class="stat-label">A faire</div><div class="stat-val s-todo">'+todo+'</div></div>'+
    '<div class="stat"><div class="stat-label">Validees</div><div class="stat-val s-done">'+done+'</div></div>'+
    '<div class="stat"><div class="stat-label">Progression</div><div class="stat-val s-total">'+pct+'%</div></div>';
  var ab=document.getElementById('archive-btn');
  if(ab) ab.classList.toggle('visible',isAdmin&&done>0&&filter!=='archived');
}

function render(){
  if(!curClient) return;
  renderStats(); updateHomeStats();
  var list=filtered(), grp=grouped(list);
  var keys=Object.keys(grp).sort(function(a,b){
    var wa=grp[a].find(function(x){return x.sev==='ab';})?0:grp[a].find(function(x){return x.sev==='mo';})?1:2;
    var wb=grp[b].find(function(x){return x.sev==='ab';})?0:grp[b].find(function(x){return x.sev==='mo';})?1:2;
    return wa-wb;
  });
  if(!keys.length){document.getElementById('list').innerHTML='<div class="loading">Aucune action'+(filter==='archived'?' archivee':'')+' pour ce client</div>';return;}
  var html=keys.map(function(sn){
    var rows=grp[sn];
    var done=rows.filter(function(a){return a.status==='done'&&!a.archived;}).length;
    var total=rows.filter(function(a){return !a.archived;}).length;
    var pct=total?Math.round(done/total*100):0;
    var worst=rows.find(function(a){return a.sev==='ab';})?'ab':rows.find(function(a){return a.sev==='mo';})?'mo':'ok';
    var sid=sn.replace(/[^a-zA-Z0-9]/g,'_');
    var rowsHtml=rows.map(function(a){
      var isDone=a.status==='done', locked=isDone&&!isAdmin;
      var hasCmt=a.comment&&a.comment.trim()!=='';
      var chkCls='chk'+(isDone?' checked':'')+(locked?' locked':'')+(isDone&&isAdmin?' admin-unlock':'');
      var chkClk=locked?'showLockMsg()':'toggleDone('+a.id+')';
      var archBtn=isAdmin?'<button class="icon-btn" onclick="toggleArchive('+a.id+')" title="'+(a.archived?'Desarchiver':'Archiver')+'">&#128193;</button>':'';
      return '<div class="action-row'+(isDone?' done':'')+'" id="row-'+a.id+'">'+
        '<div class="'+chkCls+'" onclick="'+chkClk+'" role="checkbox"></div>'+
        '<div class="action-body">'+
          '<div class="action-text">'+a.text+'</div>'+
          '<div class="action-meta">'+
            '<span class="chip">'+(a.point||'')+'</span>'+
            '<span class="chip">'+(a.fa||'')+'</span>'+
            '<span class="chip">'+(a.date||'')+'</span>'+
            '<span class="prio '+(a.prio||'med')+'">'+prioLabel(a.prio)+'</span>'+
          '</div>'+
          (isDone&&a.done_at?'<div class="done-info">&#10003; Validee le '+a.done_at+'</div>':'')+
          (hasCmt?'<div class="comment-display">&#128172; '+a.comment+'</div>':'')+
        '</div>'+
        '<div class="action-btns">'+
          '<button class="icon-btn'+(hasCmt?' on':'')+'" onclick="openComment('+a.id+')" title="Commentaire">&#128172;</button>'+
          '<button class="icon-btn" onclick="openEdit('+a.id+')" title="Modifier">&#9998;</button>'+
          archBtn+
        '</div>'+
      '</div>';
    }).join('');
    return '<div class="machine-block" id="blk-'+sid+'">'+
      '<div class="machine-header" onclick="toggleBlock('+JSON.stringify(sid)+')">'+
        '<span class="machine-sn">'+sn+'</span>'+
        '<span class="badge '+worst+'">'+sevLabel(worst)+'</span>'+
        '<div class="prog-wrap"><div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%"></div></div>'+
        '<span class="prog-text">'+done+'/'+total+' validees</span></div>'+
        '<span class="chevron">&#8964;</span>'+
      '</div>'+
      '<div class="actions-list">'+rowsHtml+'</div>'+
    '</div>';
  }).join('');
  document.getElementById('list').innerHTML=html;
}

function toggleBlock(id){var el=document.getElementById('blk-'+id);if(el)el.classList.toggle('collapsed');}
function showLockMsg(){toast('Action verrouillee - mode admin requis');}

async function toggleDone(id){
  var a=allActions.find(function(x){return x.id===id;});
  if(!a) return;
  if(a.status==='done'&&!isAdmin){showLockMsg();return;}
  var ns=a.status==='done'?'todo':'done';
  var da=ns==='done'?new Date().toLocaleDateString('fr-FR'):null;
  try{
    await api('PATCH','fa_actions?id=eq.'+id,{status:ns,done_at:da});
    a.status=ns; a.done_at=da; render(); updateHomeStats();
    toast(ns==='done'?'Action validee':'Action rouverte');
  }catch(e){toast('Erreur: '+e.message);}
}

async function toggleArchive(id){
  var a=allActions.find(function(x){return x.id===id;});
  if(!a||!isAdmin) return;
  var nv=!a.archived;
  try{
    await api('PATCH','fa_actions?id=eq.'+id,{archived:nv});
    a.archived=nv; render(); updateHomeStats();
    toast(nv?'Archivee':'Desarchivee');
  }catch(e){toast('Erreur: '+e.message);}
}

async function archiveDone(){
  if(!isAdmin) return;
  var list=clientActions().filter(function(a){return a.status==='done'&&!a.archived;});
  if(!list.length){toast('Aucune action validee a archiver');return;}
  if(!confirm('Archiver '+list.length+' action(s) validee(s) ?')) return;
  for(var i=0;i<list.length;i++){
    await api('PATCH','fa_actions?id=eq.'+list[i].id,{archived:true});
    list[i].archived=true;
  }
  render(); updateHomeStats(); toast(list.length+' action(s) archivee(s)');
}

function openComment(id){
  var a=allActions.find(function(x){return x.id===id;});
  if(!a) return;
  commentId=id;
  document.getElementById('comment-ctx').textContent='['+a.sn+'] '+a.point+' - '+a.text.substring(0,60)+(a.text.length>60?'...':'');
  document.getElementById('comment-text').value=a.comment||'';
  document.getElementById('btn-del-comment').style.display=(a.comment&&a.comment.trim()!=='')?'block':'none';
  document.getElementById('comment-modal').style.display='flex';
  setTimeout(function(){document.getElementById('comment-text').focus();},100);
}
function closeCommentModal(){document.getElementById('comment-modal').style.display='none';commentId=null;}
async function saveComment(){
  if(!commentId) return;
  var txt=document.getElementById('comment-text').value.trim();
  try{
    await api('PATCH','fa_actions?id=eq.'+commentId,{comment:txt});
    var a=allActions.find(function(x){return x.id===commentId;});
    if(a) a.comment=txt;
    closeCommentModal(); render();
    toast(txt?'Commentaire enregistre':'Commentaire supprime');
  }catch(e){toast('Erreur: '+e.message);}
}
async function deleteComment(){
  if(!commentId) return;
  try{
    await api('PATCH','fa_actions?id=eq.'+commentId,{comment:''});
    var a=allActions.find(function(x){return x.id===commentId;});
    if(a) a.comment='';
    closeCommentModal(); render(); toast('Commentaire supprime');
  }catch(e){toast('Erreur: '+e.message);}
}

function openPinModal(){
  if(isAdmin){logout();return;}
  pinInput=''; updateDots();
  document.getElementById('pin-err').textContent='';
  document.getElementById('pin-modal').style.display='flex';
}
function closePinModal(){document.getElementById('pin-modal').style.display='none';pinInput='';}
function pinKey(k){if(pinInput.length>=4)return;pinInput+=k;updateDots();if(pinInput.length===4)setTimeout(checkPin,150);}
function pinDel(){if(pinInput.length>0){pinInput=pinInput.slice(0,-1);updateDots();}}
function updateDots(){for(var i=0;i<4;i++)document.getElementById('d'+i).classList.toggle('filled',i<pinInput.length);}
function checkPin(){
  if(pinInput===ADMIN_PIN){
    isAdmin=true; closePinModal();
    document.getElementById('admin-badge').classList.add('visible');
    document.getElementById('live-dot').classList.add('admin');
    document.getElementById('live-text').textContent='Admin';
    toast('Mode admin active'); render();
  }else{
    document.getElementById('pin-err').textContent='PIN incorrect';
    pinInput=''; updateDots();
  }
}
function logout(){
  isAdmin=false;
  document.getElementById('admin-badge').classList.remove('visible');
  document.getElementById('live-dot').classList.remove('admin');
  document.getElementById('live-text').textContent='Temps reel';
  toast('Mode admin desactive'); render();
}

function openAdd(sn){
  editId=null;
  document.getElementById('modal-title').textContent='Ajouter une action';
  document.getElementById('m-sn').value=sn||'';
  ['m-point','m-fa','m-action'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('m-prio').value='med';
  document.getElementById('m-sev').value='mo';
  document.getElementById('action-modal').style.display='flex';
}
function openEdit(id){
  var a=allActions.find(function(x){return x.id===id;});
  if(!a) return;
  editId=id;
  document.getElementById('modal-title').textContent='Modifier';
  document.getElementById('m-sn').value=a.sn;
  document.getElementById('m-point').value=a.point||'';
  document.getElementById('m-fa').value=a.fa||'';
  document.getElementById('m-action').value=a.text;
  document.getElementById('m-prio').value=a.prio||'med';
  document.getElementById('m-sev').value=a.sev||'mo';
  document.getElementById('action-modal').style.display='flex';
}
function closeModal(){document.getElementById('action-modal').style.display='none';}
async function saveAction(){
  var sn=document.getElementById('m-sn').value.trim();
  var text=document.getElementById('m-action').value.trim();
  if(!sn||!text) return;
  var obj={sn:sn,text:text,point:document.getElementById('m-point').value.trim(),fa:document.getElementById('m-fa').value.trim(),prio:document.getElementById('m-prio').value,sev:document.getElementById('m-sev').value};
  try{
    if(editId){await api('PATCH','fa_actions?id=eq.'+editId,obj);toast('Action modifiee');}
    else{obj.status='todo';obj.archived=false;obj.comment='';obj.date=new Date().toLocaleDateString('fr-FR');await api('POST','fa_actions',obj);toast('Action ajoutee');}
    closeModal(); loadAll();
  }catch(e){toast('Erreur: '+e.message);}
}

function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2800);}

loadAll();
setInterval(loadAll,15000);
</script>
</body>
</html>
